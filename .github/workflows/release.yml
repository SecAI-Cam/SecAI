name: Release SecAI Native Binaries

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: secai
            asset_name: secai-linux-amd64
          - os: macos-latest
            artifact_name: secai
            asset_name: secai-darwin-amd64
          - os: windows-latest
            artifact_name: secai.exe
            asset_name: secai-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm' # Using standard GraalVM
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Native Image
        run: ./mvnw -Pnative native:compile -DskipTests
        shell: bash

      - name: Rename Binary
        run: mv target/${{ matrix.artifact_name }} target/${{ matrix.asset_name }}
        shell: bash

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
