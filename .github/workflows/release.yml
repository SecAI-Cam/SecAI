name: Release SecAI Native Binaries

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false # Prevent one OS failure from cancelling the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: secai
            asset_name: secai-linux-amd64
          - os: macos-latest
            artifact_name: secai
            asset_name: secai-darwin-amd64
          - os: windows-latest
            artifact_name: secai.exe
            asset_name: secai-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm' # Using standard GraalVM
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Native Image (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mvn -Pnative native:compile -DskipTests
        shell: bash

      - name: Build Native Image (Windows)
        if: matrix.os == 'windows-latest'
        run: .\mvnw.cmd -Pnative native:compile -DskipTests
        shell: cmd

      - name: Rename Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.artifact_name }} target/${{ matrix.asset_name }}
        shell: bash

      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: ren target\${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        shell: cmd

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
